<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biblioteca | Hemiola y Síncopa</title>

<link rel="stylesheet" href="stylesbiblioteca.css">

</head>

<body>

<div id="login">

<h2>Biblioteca privada</h2>

<p>Acceso exclusivo para estudiantes.</p>

<input type="password" id="password" placeholder="Contraseña">

<button onclick="checkPassword()">Entrar</button>

</div>

<div id="library" style="display:none">

<h1>Biblioteca Hemiola y Síncopa</h1>

<div class="resource-card">

<h3>Ritmo Básico – Workbook</h3>

<a href="pdfs/ritmo-basico.pdf">Descargar</a>

</div>

</div>

<script>

function checkPassword(){

let pass = document.getElementById("password").value

if(pass === "hemiola2026"){

document.getElementById("login").style.display="none"
document.getElementById("library").style.display="block"

}

else{

alert("Contraseña incorrecta")

}

}

</script>

</body>
</html>
